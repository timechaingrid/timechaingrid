<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Timechain Grid — square brass frame, cyan-accented spiral grid, gold ₿ center -->
  <defs>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(0, 212, 255, 0.28)"/>
      <stop offset="55%" stop-color="rgba(0, 212, 255, 0.08)"/>
      <stop offset="100%" stop-color="rgba(0, 0, 0, 0)"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0A656"/>
      <stop offset="50%" stop-color="#C28840"/>
      <stop offset="100%" stop-color="#8C5E29"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="96" height="96" rx="11" fill="#08080C"/>
  <!-- Brass outer frame -->
  <rect x="3" y="3" width="94" height="94" rx="10" fill="none" stroke="url(#brass)" stroke-width="2.5"/>
  <!-- Cyan inner glow -->
  <rect x="8" y="8" width="84" height="84" rx="7" fill="url(#cyanGlow)"/>
  <!-- Corner rivets (steampunk detail) -->
  <circle cx="10" cy="10" r="1.8" fill="#8C5E29"/>
  <circle cx="90" cy="10" r="1.8" fill="#8C5E29"/>
  <circle cx="10" cy="90" r="1.8" fill="#8C5E29"/>
  <circle cx="90" cy="90" r="1.8" fill="#8C5E29"/>
  <!-- 3x3 tile grid representing the spiral real-estate -->
  <!-- Outer-ring tiles (deep cyan, dim) -->
  <rect x="20" y="20" width="18" height="18" rx="2" fill="#006080" opacity="0.85"/>
  <rect x="41" y="20" width="18" height="18" rx="2" fill="#00A8CC"/>
  <rect x="62" y="20" width="18" height="18" rx="2" fill="#006080" opacity="0.85"/>
  <rect x="20" y="41" width="18" height="18" rx="2" fill="#00A8CC"/>
  <!-- Center tile — gold with Bitcoin symbol -->
  <rect x="41" y="41" width="18" height="18" rx="2" fill="#FFD700"/>
  <text x="50" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#08080C">₿</text>
  <rect x="62" y="41" width="18" height="18" rx="2" fill="#00A8CC"/>
  <rect x="20" y="62" width="18" height="18" rx="2" fill="#006080" opacity="0.85"/>
  <rect x="41" y="62" width="18" height="18" rx="2" fill="#00A8CC"/>
  <rect x="62" y="62" width="18" height="18" rx="2" fill="#006080" opacity="0.85"/>
  <!-- Inner highlight on center tile (depth) -->
  <rect x="42" y="42" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
</svg>
