name: Bug report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **If the bug involves a request to any third-party
        domain** (anything other than this site in the DevTools → Network tab), please
        report it privately via [SECURITY.md](../../SECURITY.md) instead — that is a
        privacy/security issue, not a public bug.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: e.g. Firefox 138 / Chrome 137 / Safari 18
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14 / Ubuntu 24.04 / Windows 11
  - type: input
    id: where
    attributes:
      label: Site URL or local commit hash
      placeholder: e.g. timechaingrid.com or local 7262acc
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: This bug does NOT involve a request to a third-party domain (if it does, I will use SECURITY.md instead)
          required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Console errors, stack traces, screenshots, related issues.
